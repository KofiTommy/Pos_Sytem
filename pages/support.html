<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CediTill Support</title>
    <link rel="icon" type="image/svg+xml" href="../assets/images/ceditill-favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html">
                <img data-business-logo class="d-none me-1" style="height: 30px; width: auto;" alt="Business logo">
                <span data-business-name>CediTill</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="products.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact Store</a>
                    </li>
                    <li class="nav-item d-none d-lg-block">
                        <a class="btn btn-sm btn-outline-primary nav-auth-btn ms-lg-2" href="login.html" data-admin-link>
                            <i class="fas fa-sign-in-alt"></i> Staff Login
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="bg-light py-4">
        <div class="container">
            <h1 class="mb-0"><i class="fas fa-life-ring"></i> CediTill Support</h1>
            <p class="text-muted mb-0">Report platform issues directly to CediTill HQ.</p>
        </div>
    </div>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-light">
                        <h5 class="mb-0">Send Support Message</h5>
                    </div>
                    <div class="card-body">
                        <form id="supportForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Full Name *</label>
                                    <input id="supportName" class="form-control" maxlength="120" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Email *</label>
                                    <input id="supportEmail" type="email" class="form-control" maxlength="160" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Phone</label>
                                    <input id="supportPhone" class="form-control" maxlength="40">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Subject *</label>
                                    <input id="supportSubject" class="form-control" maxlength="180" required placeholder="Short issue summary">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Message *</label>
                                    <textarea id="supportMessage" class="form-control" rows="7" maxlength="6000" required placeholder="Describe the issue and any steps that caused it."></textarea>
                                </div>
                                <div class="col-12 d-flex gap-2">
                                    <button id="sendSupportBtn" type="submit" class="btn btn-primary">
                                        <i class="fas fa-paper-plane"></i> Send to CediTill HQ
                                    </button>
                                    <a href="contact.html" class="btn btn-outline-secondary">Back to Store Contact</a>
                                </div>
                            </div>
                        </form>
                        <div id="supportAlert" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/business-info.js?v=20260301-1"></script>
    <script src="../js/broadcast-notices.js?v=20260304-1"></script>
    <script src="../js/scripts.js?v=20260302-5"></script>
    <script>
        function showSupportAlert(message, type) {
            document.getElementById('supportAlert').innerHTML =
                `<div class="alert alert-${type} mb-0">${escapeHtml(message)}</div>`;
        }

        document.getElementById('supportForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const sendBtn = document.getElementById('sendSupportBtn');
            const originalLabel = sendBtn.innerHTML;
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Sending...';

            try {
                const formData = new FormData();
                formData.append('name', document.getElementById('supportName').value.trim());
                formData.append('email', document.getElementById('supportEmail').value.trim());
                formData.append('phone', document.getElementById('supportPhone').value.trim());
                formData.append('subject', document.getElementById('supportSubject').value.trim());
                formData.append('message', document.getElementById('supportMessage').value.trim());
                appendTenantToFormData(formData);

                const response = await fetch(withTenantQuery('../php/support-messages.php'), {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (!data.success) {
                    throw new Error(data.message || 'Failed to send support message.');
                }

                event.target.reset();
                showSupportAlert(`Support message sent successfully (Ticket #${Number(data.ticket_id || 0)}).`, 'success');
            } catch (error) {
                showSupportAlert(error.message || 'Failed to send support message.', 'danger');
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = originalLabel;
            }
        });
    </script>
</body>

</html>

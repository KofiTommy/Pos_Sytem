<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Password Reset - Mother Care POS</title>
    <link rel="icon" type="image/svg+xml" href="../assets/images/ceditill-favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #5b6ee1 0%, #7c4fa0 100%);
        }

        .auth-card {
            width: 100%;
            max-width: 620px;
            border-radius: 14px;
            box-shadow: 0 16px 42px rgba(0, 0, 0, 0.22);
            border: none;
        }

        .auth-card .card-body {
            padding: 28px 24px;
        }

        .auth-title {
            color: #334155;
            font-weight: 700;
        }

        .auth-muted {
            color: #64748b;
        }

        .debug-link-wrap {
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            border-radius: 10px;
            padding: 12px;
        }
    </style>
</head>
<body>
    <main class="auth-shell">
        <div class="card auth-card">
            <div class="card-body">
                <h1 class="h4 auth-title mb-2"><i class="fas fa-key me-2"></i>Owner Password Recovery</h1>
                <p class="auth-muted mb-3">Request a reset link or set a new owner password if you already have a valid token.</p>
                <div id="alertHost"></div>

                <section id="requestSection">
                    <h2 class="h6 mb-3">Request Reset Link</h2>
                    <form id="requestForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="requestBusinessCode" class="form-label">Business Code</label>
                                <input type="text" id="requestBusinessCode" class="form-control" maxlength="64" required>
                            </div>
                            <div class="col-md-6">
                                <label for="requestIdentifier" class="form-label">Owner Email or Username</label>
                                <input type="text" id="requestIdentifier" class="form-control" maxlength="160" required>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary w-100" id="requestBtn">
                                    <i class="fas fa-paper-plane me-1"></i> Send Reset Link
                                </button>
                            </div>
                        </div>
                    </form>
                    <div id="debugLinkHost" class="mt-3"></div>
                </section>

                <section id="resetSection" class="d-none">
                    <h2 class="h6 mb-3">Set New Owner Password</h2>
                    <form id="resetForm">
                        <input type="hidden" id="resetToken">
                        <input type="hidden" id="resetBusinessCode">
                        <div class="row g-3">
                            <div class="col-12">
                                <label for="newPassword" class="form-label">New Password</label>
                                <input type="password" id="newPassword" class="form-control" minlength="10" required>
                            </div>
                            <div class="col-12">
                                <label for="confirmPassword" class="form-label">Confirm Password</label>
                                <input type="password" id="confirmPassword" class="form-control" minlength="10" required>
                            </div>
                            <div class="col-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="showResetPassword">
                                    <label class="form-check-label" for="showResetPassword">Show password while typing</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-success w-100" id="resetBtn">
                                    <i class="fas fa-lock me-1"></i> Update Password
                                </button>
                            </div>
                        </div>
                    </form>
                </section>

                <div class="mt-4 text-center">
                    <a href="login.html" id="backLoginLink"><i class="fas fa-arrow-left me-1"></i> Back to Login</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        function sanitizeTenantCode(value) {
            return String(value || '')
                .toLowerCase()
                .trim()
                .replace(/[^a-z0-9-]/g, '')
                .substring(0, 64);
        }

        function detectTenantCodeFromPath(pathname) {
            const segments = String(pathname || '')
                .split('/')
                .map((part) => part.trim())
                .filter(Boolean);

            for (let i = 0; i < segments.length - 1; i += 1) {
                if (segments[i].toLowerCase() !== 'b') continue;
                const candidate = sanitizeTenantCode(segments[i + 1]);
                if (candidate) return candidate;
            }
            return '';
        }

        function withTenantQuery(url, tenantCode) {
            const code = sanitizeTenantCode(tenantCode || '');
            if (!code) return url;
            if (/[?&](tenant|business_code)=/i.test(url)) return url;
            return `${url}${url.includes('?') ? '&' : '?'}tenant=${encodeURIComponent(code)}`;
        }

        function parseJsonResponse(response) {
            return response.text().then((rawText) => {
                if (!rawText) {
                    throw new Error('Empty response from server.');
                }
                try {
                    return JSON.parse(rawText);
                } catch (error) {
                    throw new Error(rawText.substring(0, 220));
                }
            });
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function showAlert(message, type) {
            document.getElementById('alertHost').innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show">
                    ${escapeHtml(message)}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        function setButtonLoading(button, loadingText, isLoading) {
            if (!button) return;
            if (isLoading) {
                button.dataset.originalText = button.innerHTML;
                button.disabled = true;
                button.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>${loadingText}`;
            } else {
                button.disabled = false;
                button.innerHTML = button.dataset.originalText || button.innerHTML;
            }
        }

        function updateBackLoginLink(tenantCode) {
            const link = document.getElementById('backLoginLink');
            link.href = withTenantQuery('login.html', tenantCode);
        }

        function showRequestMode() {
            document.getElementById('requestSection').classList.remove('d-none');
            document.getElementById('resetSection').classList.add('d-none');
        }

        function showResetMode(token, tenantCode) {
            document.getElementById('requestSection').classList.add('d-none');
            document.getElementById('resetSection').classList.remove('d-none');
            document.getElementById('resetToken').value = token;
            document.getElementById('resetBusinessCode').value = tenantCode;
        }

        function renderDebugLink(link) {
            const host = document.getElementById('debugLinkHost');
            if (!link) {
                host.innerHTML = '';
                return;
            }
            host.innerHTML = `
                <div class="debug-link-wrap">
                    <small class="text-muted d-block mb-1">Local development reset link</small>
                    <a href="${escapeHtml(link)}">${escapeHtml(link)}</a>
                </div>
            `;
        }

        async function handleRequestSubmit(event) {
            event.preventDefault();
            const requestBtn = document.getElementById('requestBtn');
            setButtonLoading(requestBtn, 'Sending...', true);
            renderDebugLink('');

            try {
                const businessCode = sanitizeTenantCode(document.getElementById('requestBusinessCode').value);
                const identifier = document.getElementById('requestIdentifier').value.trim();
                if (!businessCode || !identifier) {
                    throw new Error('Business code and owner email/username are required.');
                }

                const response = await fetch('../php/owner-password-reset-request.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        business_code: businessCode,
                        identifier: identifier
                    })
                });
                const data = await parseJsonResponse(response);
                if (!data.success) {
                    throw new Error(data.message || 'Unable to send reset link.');
                }

                localStorage.setItem('tenant_code', businessCode);
                updateBackLoginLink(businessCode);
                showAlert(data.message || 'If the account is valid, a reset link was sent.', 'success');
                renderDebugLink(data.reset_link || '');
            } catch (error) {
                showAlert(error.message || 'Unable to send reset link.', 'danger');
            } finally {
                setButtonLoading(requestBtn, 'Sending...', false);
            }
        }

        async function handleResetSubmit(event) {
            event.preventDefault();
            const resetBtn = document.getElementById('resetBtn');
            setButtonLoading(resetBtn, 'Updating...', true);

            try {
                const token = document.getElementById('resetToken').value.trim();
                const businessCode = sanitizeTenantCode(document.getElementById('resetBusinessCode').value);
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (!token) {
                    throw new Error('Reset token is missing.');
                }
                if (newPassword !== confirmPassword) {
                    throw new Error('Password confirmation does not match.');
                }

                const response = await fetch('../php/owner-password-reset.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: token,
                        business_code: businessCode,
                        new_password: newPassword,
                        confirm_password: confirmPassword
                    })
                });
                const data = await parseJsonResponse(response);
                if (!data.success) {
                    throw new Error(data.message || 'Unable to reset password.');
                }

                showAlert(data.message || 'Password reset successful.', 'success');
                setTimeout(() => {
                    window.location.href = withTenantQuery('login.html', businessCode);
                }, 900);
            } catch (error) {
                showAlert(error.message || 'Unable to reset password.', 'danger');
            } finally {
                setButtonLoading(resetBtn, 'Updating...', false);
            }
        }

        function loadContext() {
            const params = new URLSearchParams(window.location.search || '');
            const fromUrl = sanitizeTenantCode(params.get('tenant') || params.get('business_code') || '');
            const fromPath = detectTenantCodeFromPath(window.location.pathname || '');
            const fromStorage = sanitizeTenantCode(localStorage.getItem('tenant_code') || '');
            const tenantCode = fromUrl || fromPath || fromStorage;
            const token = String(params.get('token') || '').trim();

            if (tenantCode) {
                localStorage.setItem('tenant_code', tenantCode);
            }

            document.getElementById('requestBusinessCode').value = tenantCode;
            updateBackLoginLink(tenantCode);

            if (token) {
                showResetMode(token, tenantCode);
            } else {
                showRequestMode();
            }
        }

        document.getElementById('requestForm').addEventListener('submit', handleRequestSubmit);
        document.getElementById('resetForm').addEventListener('submit', handleResetSubmit);
        document.getElementById('requestBusinessCode').addEventListener('input', function () {
            this.value = sanitizeTenantCode(this.value);
            updateBackLoginLink(this.value);
        });
        document.getElementById('showResetPassword').addEventListener('change', function () {
            const inputType = this.checked ? 'text' : 'password';
            document.getElementById('newPassword').type = inputType;
            document.getElementById('confirmPassword').type = inputType;
        });

        document.addEventListener('DOMContentLoaded', loadContext);
    </script>
</body>
</html>
